<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Instrument</title>
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet"/>
  <!-- MDB -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/3.10.2/mdb.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
  <style>
    .custom-rounded {
      border-radius: 25px; /* More pronounced rounded corners */
    }
    .reduced-padding {
      padding-bottom: 0.5rem !important; /* Reduced padding at the bottom */
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Home</a>
    <button class="navbar-toggler" type="button" data-mdb-toggle="collapse" data-mdb-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <i class="fas fa-bars"></i>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="add-instrument.html">Add Instrument</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container my-5">
  <div class="card custom-rounded" style="background-color: #f8f9fa;">
    <div class="card-body">
      <h2>Add New Instrument</h2>
      <form id="add-instrument-form" class="form">
        <div class="mb-3">
          <label for="instrument-name" class="form-label">Instrument Name:</label>
          <input type="text" class="form-control" id="instrument-name" required>
        </div>

        <div class="mb-3">
          <label for="description" class="form-label">Description:</label>
          <textarea class="form-control" id="description" required></textarea>
        </div>

        <div class="mb-3">
          <label for="french" class="form-label">French:</label>
          <input type="text" class="form-control" id="french" required>
        </div>

        <div class="mb-3">
          <label for="german" class="form-label">German:</label>
          <input type="text" class="form-control" id="german" required>
        </div>

        <div class="mb-3">
          <label for="italian" class="form-label">Italian:</label>
          <input type="text" class="form-control" id="italian" required>
        </div>

        <div class="mb-3">
          <label for="spanish" class="form-label">Spanish:</label>
          <input type="text" class="form-control" id="spanish" required>
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    </div>
  </div>
</div>

<!-- MDB -->
<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/3.10.2/mdb.min.js"></script>
<script type="module" src="add-instrument.js"></script>
</body>
</html>
